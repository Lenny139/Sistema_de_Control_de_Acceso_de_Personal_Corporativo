<!doctype html>
<html lang="es" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Control de Acceso - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/main.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/responsive.css" />
  </head>
  <body data-theme="light" class="app-shell">
    <main class="container min-vh-100 d-flex align-items-center justify-content-center py-5 app-main">
      <section class="mx-auto login-panel" style="max-width: 420px; width: 100%">
        <div class="d-flex justify-content-end align-items-center gap-2 mb-2">
          <button id="login-theme-toggle" class="btn btn-outline-secondary btn-sm" type="button">🌙/☀️</button>
          <select id="login-language-select" class="form-select form-select-sm" style="width: 90px">
            <option value="es" selected>ES</option>
            <option value="en">EN</option>
          </select>
        </div>
        <div class="text-center mb-4">
          <img src="https://via.placeholder.com/72" alt="Logo" class="mb-2" width="72" height="72" />
          <h1 class="app-title mb-0" data-i18n="app.title">Sistema de Control de Acceso</h1>
        </div>
        <div id="login-root"></div>
      </section>
    </main>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
