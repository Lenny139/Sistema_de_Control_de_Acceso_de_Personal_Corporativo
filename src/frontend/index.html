<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Control de Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="./css/styles.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <main class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 id="title" class="h3">Sistema de Control de Acceso</h1>
        <button id="langToggle" class="btn btn-outline-primary btn-sm">EN</button>
      </div>

      <section class="card p-3 mb-4">
        <h2 class="h5" id="loginTitle">Inicio de sesión</h2>
        <form id="loginForm" class="row g-2">
          <div class="col-md-5"><input id="username" class="form-control" placeholder="Usuario" /></div>
          <div class="col-md-5"><input id="password" type="password" class="form-control" placeholder="Contraseña" /></div>
          <div class="col-md-2"><button class="btn btn-primary w-100" type="submit" id="loginBtn">Entrar</button></div>
        </form>
      </section>

      <section class="card p-3">
        <h2 class="h5" id="employeesTitle">Empleados</h2>
        <ul id="employeeList" class="list-group"></ul>
      </section>
    </main>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
